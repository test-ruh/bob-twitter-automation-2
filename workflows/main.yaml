name: main
args:
  run_id:
    default: $(uuidgen)
env:
  RUN_ID: ${run_id}
  PG_CONNECTION_STRING: ${PG_CONNECTION_STRING}
  ORG_ID: ${ORG_ID}
  AGENT_ID: ${AGENT_ID}
steps:
  - id: provision-schema
    run: python3 scripts/data_writer.py provision
    timeout_ms: 30000
  - id: publish
    run: bash skills/publish-fixed-twitter-post/scripts/run.sh
    stdin: "{\"message\":\"Good morning People\"}"
    timeout_ms: 600000
  - id: record
    run: bash skills/record-run-log/scripts/run.sh
    stdin: ${steps.publish.output}
    timeout_ms: 600000
